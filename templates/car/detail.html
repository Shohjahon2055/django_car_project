<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Detail</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f7fa;
        }

        .card{
            border:none;
            border-radius:20px;
            overflow:hidden;
            box-shadow:0 10px 30px rgba(0,0,0,.15);
        }

        .car-img{
            width:100%;
            height:420px;
            object-fit:cover;
        }

        .price{
            color:#198754;
            font-size:34px;
            font-weight:bold;
        }

        .title{
            font-weight:bold;
            margin-bottom:20px;
        }

        .info{
            font-size:18px;
            margin-bottom:12px;
        }

        .container{
            margin-top:50px;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="card">

        <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=1200"
             class="car-img">

        <div class="card-body p-4">

            <h1 class="title">
                {{ shoh.title }}
            </h1>

            <div class="price">
                ${{ shoh.price }}
            </div>

            <hr>

            <div class="info">
                <strong>🆔 ID:</strong> {{ shoh.id }}
            </div>

            <div class="info">
                <strong>🎨 Color:</strong> {{ shoh.color }}
            </div>

            <div class="info">
                <strong>📅 Release Date:</strong> {{ shoh.release_date }}
            </div>

            <div class="mt-4">

                <a href="{% url 'list' %}" class="btn btn-secondary">
                    ⬅ Back
                </a>

                <a href="{% url 'create' %}" class="btn btn-success">
                    ➕ Add New Car
                </a>

            </div>

        </div>

    </div>

</div>

</body>
</html>
